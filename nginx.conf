server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location = /health             { access_log off; return 200; }
    location = /favicon.ico        { access_log off; try_files $uri =204; }

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass              https://aerosurrogate-production-7743.up.railway.app/;
        proxy_http_version      1.1;
        proxy_ssl_server_name   on;
        proxy_ssl_name          aerosurrogate-production-7743.up.railway.app;
        proxy_set_header        Host        aerosurrogate-production-7743.up.railway.app;
        proxy_set_header        X-Real-IP   $remote_addr;
        proxy_read_timeout      120s;
        proxy_connect_timeout   10s;
    }
}
